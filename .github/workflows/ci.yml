name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: SwiftLint
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6
      - name: Install SwiftLint
        run: brew install swiftlint
      - name: Run SwiftLint
        run: swiftlint lint --strict --reporter github-actions-logging

  build:
    name: Build
    runs-on: macos-26
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: Build for iOS Simulator
        run: |
          xcodebuild -project blood_on_the_clocktower.xcodeproj \
            -scheme blood_on_the_clocktower \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "generic/platform=iOS Simulator" \
            build

  unit-tests:
    name: Unit Tests
    runs-on: macos-26
    needs: build
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: List Available Simulators
        run: xcrun simctl list devices available | grep iPhone | head -5
      - name: Run Unit Tests
        run: |
          xcodebuild -project blood_on_the_clocktower.xcodeproj \
            -scheme blood_on_the_clocktower \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=iPhone 17 Pro" \
            test \
            -only-testing:blood_on_the_clocktowerTests \
            -enableCodeCoverage YES \
            -resultBundlePath UnitTestResults.xcresult
      - name: Upload Unit Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: unit-test-results
          path: UnitTestResults.xcresult
          retention-days: 7

  ui-tests:
    name: UI Tests
    runs-on: macos-26
    needs: build
    steps:
      - uses: actions/checkout@v6
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app
      - name: List Available Simulators
        run: xcrun simctl list devices available | grep iPhone | head -5
      - name: Boot Simulator
        run: |
          DEVICE_ID=$(xcrun simctl list devices available | grep "iPhone 17 Pro" | head -1 | grep -oE '[0-9A-F-]{36}')
          xcrun simctl boot "$DEVICE_ID" || true
      - name: Run UI Tests
        run: |
          xcodebuild -project blood_on_the_clocktower.xcodeproj \
            -scheme blood_on_the_clocktower \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination "platform=iOS Simulator,name=iPhone 17 Pro" \
            test \
            -only-testing:blood_on_the_clocktowerUITests \
            -resultBundlePath UITestResults.xcresult
      - name: Upload UI Test Results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ui-test-results
          path: UITestResults.xcresult
          retention-days: 7
